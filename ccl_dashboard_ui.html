<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CCL OMNIA — CapeChain Labs Desktop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
:root{--c1:#00f5c8;--c2:#00bfff;--c3:#df80ff;--c4:#ffd700;--ok:#39ff87;--err:#ff4466;--bg:#080820;--fg:#c8d8f0;--dim:#4a6a8a;--glass:rgba(10,10,30,.75)}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg)}
/* animated background */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 0% 20%,rgba(0,245,200,.08) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 100% 80%,rgba(223,128,255,.07) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(0,191,255,.04) 0%,transparent 50%);
  animation:mesh 15s ease-in-out infinite alternate}
@keyframes mesh{0%{transform:scale(1) rotate(0deg)}100%{transform:scale(1.08) rotate(2deg)}}
/* scanlines */
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,200,.015) 2px,rgba(0,245,200,.015) 3px)}
/* floating particles */
#particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.p{position:absolute;width:3px;height:3px;background:rgba(0,245,200,.3);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
/* ===== DESKTOP ===== */
#desktop{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column}
/* WALLPAPER */
#wallpaper{position:fixed;inset:0;z-index:-1;transition:opacity 1s}
/* TASKBAR */
#taskbar{flex-shrink:0;height:42px;background:rgba(8,8,32,.85);backdrop-filter:blur(20px);border-top:1px solid rgba(0,245,200,.1);display:flex;align-items:center;padding:0 12px;gap:4px;position:fixed;bottom:0;left:0;right:0;z-index:100}
#startBtn{padding:6px 12px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--fg);font-family:'Orbitron',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .2s}
#startBtn:hover{background:rgba(0,245,200,.1);border-color:rgba(0,245,200,.2)}
#startBtn .g{background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.taskbar-sep{width:1px;height:20px;background:rgba(255,255,255,.06);margin:0 6px}
.taskbar-items{display:flex;flex:1;gap:2px;overflow-x:auto}
.taskbar-item{padding:3px 10px;border-radius:4px;font-size:.65rem;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .2s;border:1px solid transparent}
.taskbar-item:hover,.taskbar-item.active{background:rgba(0,245,200,.08);color:var(--fg);border-color:rgba(0,245,200,.12)}
#taskbarClock{font-size:.65rem;color:var(--dim);font-family:'JetBrains Mono',monospace;padding:0 8px;white-space:nowrap}
#trayIcon{width:20px;height:20px;border-radius:50%;margin:0 4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;cursor:pointer}
/* DESKTOP ICONS */
#desktopIcons{position:fixed;top:12px;left:12px;z-index:3;display:flex;flex-direction:column;gap:8px}
.desktop-icon{width:72px;padding:8px 4px;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;border:1px solid transparent;text-align:center}
.desktop-icon:hover{background:rgba(0,245,200,.06);border-color:rgba(0,245,200,.1)}
.desktop-icon .icon{font-size:1.6rem;line-height:1}
.desktop-icon .label{font-size:.55rem;color:var(--dim);line-height:1.2;word-break:break-word}
/* WINDOWS */
#windows{position:fixed;inset:0;top:0;bottom:42px;z-index:5;pointer-events:none}
.window{position:absolute;border-radius:10px;border:1px solid rgba(0,245,200,.12);background:var(--glass);backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden;pointer-events:auto;min-width:280px;min-height:120px;animation:winIn .25s ease}
@keyframes winIn{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.win-header{flex-shrink:0;height:34px;display:flex;align-items:center;padding:0 10px;gap:8px;cursor:move;background:rgba(0,245,200,.04);border-bottom:1px solid rgba(0,245,200,.06)}
.win-dots{display:flex;gap:5px}
.win-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:opacity .2s}
.win-dot:hover{opacity:.7}
.win-dot.r{background:#ff4466}
.win-dot.y{background:#ffd700}
.win-dot.g{background:var(--ok)}
.win-title{font-size:.65rem;color:var(--dim);font-family:'JetBrains Mono',monospace;flex:1}
.win-body{flex:1;overflow:auto;padding:10px 12px;font-size:.72rem}
.win-body::-webkit-scrollbar{width:3px}
.win-body::-webkit-scrollbar-thumb{background:rgba(0,245,200,.15);border-radius:2px}
/* TERMINAL WINDOW */
.term-win .win-body{background:rgba(0,0,0,.4);padding:0;display:flex;flex-direction:column}
.term-output{flex:1;overflow-y:auto;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:.68rem;line-height:1.5;color:#8aaac8;min-height:100px}
.term-output .l{white-space:pre-wrap;word-break:break-all}
.term-output .l.cmd{color:var(--c1)}
.term-output .l.out{color:#8aaac8}
.term-output .l.ok{color:var(--ok)}
.term-output .l.err{color:var(--err)}
.term-input-row{flex-shrink:0;display:flex;border-top:1px solid rgba(0,245,200,.08);padding:5px 10px;background:rgba(0,0,0,.3);align-items:center}
.term-prompt{color:var(--c1);font-family:'JetBrains Mono',monospace;font-size:.68rem;margin-right:6px}
.term-input{flex:1;background:transparent;border:none;outline:none;color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:.68rem}
.term-input::placeholder{color:#2a4a5a}
/* SYS MONITOR */
.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sys-metric{text-align:center;padding:8px;border-radius:6px;background:rgba(0,0,0,.2)}
.sys-metric .val{font-size:1.2rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.sys-metric .lbl{font-size:.55rem;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}
.bar-bg{height:4px;border-radius:2px;background:rgba(255,255,255,.05);margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s}
/* TODO */
.todo-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.7rem}
.todo-item:last-child{border:none}
.todo-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.todo-cb.done{background:var(--ok);border-color:var(--ok)}
.todo-cb.done::after{content:'✓';color:#000;font-size:9px;font-weight:700}
.todo-text{flex:1}
.todo-text.done{text-decoration:line-through;color:var(--dim)}
.todo-del{font-size:.55rem;color:var(--dim);cursor:pointer;padding:2px 4px}
/* NOTES */
.note-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.7rem;display:flex;gap:6px}
.note-item:last-child{border:none}
.note-time{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.6rem;white-space:nowrap}
/* PROJECTS */
.proj-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.7rem}
.proj-item:last-child{border:none}
.proj-icon{font-size:1rem}
/* PROVIDERS */
.prov-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.68rem;border-bottom:1px solid rgba(255,255,255,.03)}
.prov-item:last-child{border:none}
.prov-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.prov-on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.prov-off{background:var(--dim)}
/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.7rem}
select{background:rgba(0,0,0,.3);border:1px solid rgba(0,245,200,.12);border-radius:4px;padding:4px 8px;color:var(--fg);font-size:.65rem;font-family:'JetBrains Mono',monospace}
input[type=text]{background:rgba(0,0,0,.3);border:1px solid rgba(0,245,200,.12);border-radius:4px;padding:4px 8px;color:var(--fg);font-size:.65rem;font-family:'JetBrains Mono',monospace;outline:none}
input[type=text]:focus{border-color:rgba(0,245,200,.3)}
button{background:rgba(0,245,200,.08);border:1px solid rgba(0,245,200,.15);border-radius:4px;padding:4px 10px;color:var(--fg);font-size:.65rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
button:hover{background:rgba(0,245,200,.15);border-color:rgba(0,245,200,.25)}
/* START MENU */
#startMenu{position:fixed;bottom:44px;left:8px;z-index:99;width:240px;border-radius:10px;border:1px solid rgba(0,245,200,.12);background:var(--glass);backdrop-filter:blur(20px);padding:8px;display:none;animation:winIn .15s ease;box-shadow:0 4px 30px rgba(0,0,0,.5)}
.start-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:.68rem;transition:all .2s;border:1px solid transparent}
.start-item:hover{background:rgba(0,245,200,.08);border-color:rgba(0,245,200,.1)}
/* WELCOME OVERLAY */
#welcomeOverlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);animation:fadeOut 1s ease 2.5s forwards}
@keyframes fadeOut{0%{opacity:1}100%{opacity:0;pointer-events:none}}
#welcomeOverlay .content{text-align:center;animation:welcomIn .8s ease}
@keyframes welcomIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
#welcomeOverlay h1{font-family:'Orbitron',sans-serif;font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.1em}
#welcomeOverlay .sub{font-size:.85rem;color:var(--dim);margin-top:8px;letter-spacing:.2em;font-weight:300}
#welcomeOverlay .tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#2a4a5a;margin-top:16px;letter-spacing:.1em}
#welcomeOverlay .loader{margin-top:20px;display:flex;justify-content:center;gap:4px}
#welcomeOverlay .loader span{width:6px;height:6px;border-radius:50%;animation:loadAnim 1.2s ease-in-out infinite}
#welcomeOverlay .loader span:nth-child(1){background:var(--c1);animation-delay:0s}
#welcomeOverlay .loader span:nth-child(2){background:var(--c2);animation-delay:.15s}
#welcomeOverlay .loader span:nth-child(3){background:var(--c3);animation-delay:.3s}
#welcomeOverlay .loader span:nth-child(4){background:var(--c4);animation-delay:.45s}
#welcomeOverlay .loader span:nth-child(5){background:var(--ok);animation-delay:.6s}
@keyframes loadAnim{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}
/* scrollbar global */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,245,200,.1);border-radius:2px}
/* responsive */
@media(max-width:768px){
  .window{width:95vw!important;left:2.5vw!important}
  #desktopIcons{flex-direction:row;flex-wrap:wrap;gap:4px}
  .desktop-icon{width:60px}
  #startMenu{width:200px}
}
</style>
</head>
<body>
<div id="particles"></div>

<!-- WELCOME SCREEN -->
<div id="welcomeOverlay">
  <div class="content">
    <h1>⬡ CCL</h1>
    <div class="sub">C A P E C H A I N &nbsp; L A B S</div>
    <div class="tag">OMNIA · AI-NATIVE OPERATING SYSTEM</div>
    <div class="loader"><span></span><span></span><span></span><span></span><span></span></div>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop">
  <!-- Desktop Icons -->
  <div id="desktopIcons">
    <div class="desktop-icon" onclick="openWindow('terminal')"><div class="icon">⬢</div><div class="label">Terminal</div></div>
    <div class="desktop-icon" onclick="openWindow('files')"><div class="icon">📁</div><div class="label">Files</div></div>
    <div class="desktop-icon" onclick="openWindow('todo')"><div class="icon">✓</div><div class="label">Todo</div></div>
    <div class="desktop-icon" onclick="openWindow('notes')"><div class="icon">📝</div><div class="label">Notes</div></div>
    <div class="desktop-icon" onclick="openWindow('monitor')"><div class="icon">📊</div><div class="label">Monitor</div></div>
    <div class="desktop-icon" onclick="openWindow('projects')"><div class="icon">◆</div><div class="label">Projects</div></div>
    <div class="desktop-icon" onclick="openWindow('providers')"><div class="icon">◈</div><div class="label">AI</div></div>
    <div class="desktop-icon" onclick="openWindow('wallet')"><div class="icon">◎</div><div class="label">Wallet</div></div>
    <div class="desktop-icon" onclick="openWindow('settings')"><div class="icon">⚙</div><div class="label">Settings</div></div>
  </div>

  <!-- WINDOWS CONTAINER -->
  <div id="windows"></div>

  <!-- START MENU -->
  <div id="startMenu">
    <div class="start-item" onclick="openWindow('terminal');toggleStart()"><span>⬢</span> Terminal</div>
    <div class="start-item" onclick="openWindow('files');toggleStart()"><span>📁</span> File Manager</div>
    <div class="start-item" onclick="openWindow('todo');toggleStart()"><span>✓</span> Todo List</div>
    <div class="start-item" onclick="openWindow('notes');toggleStart()"><span>📝</span> Notes</div>
    <div class="start-item" onclick="openWindow('monitor');toggleStart()"><span>📊</span> System Monitor</div>
    <div class="start-item" onclick="openWindow('projects');toggleStart()"><span>◆</span> Projects</div>
    <div class="start-item" onclick="openWindow('providers');toggleStart()"><span>◈</span> AI Providers</div>
    <div class="start-item" onclick="openWindow('wallet');toggleStart()"><span>◎</span> Wallet</div>
    <div class="start-item" onclick="openWindow('settings');toggleStart()"><span>⚙</span> Settings</div>
    <div style="border-top:1px solid rgba(255,255,255,.06);margin-top:4px;padding-top:4px">
      <div class="start-item" onclick="runCCL('help');toggleStart()"><span>?</span> Quick Help</div>
      <div class="start-item" onclick="runCCL('neofetch');toggleStart()"><span>⬡</span> System Info</div>
    </div>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <button id="startBtn" onclick="toggleStart()"><span class="g">⬡ CCL</span></button>
    <div class="taskbar-sep"></div>
    <div class="taskbar-items" id="taskbarItems"></div>
    <div class="taskbar-sep"></div>
    <div id="trayIcon" title="AI Status" onclick="openWindow('providers')">⬡</div>
    <span id="taskbarClock"></span>
  </div>
</div>

<script>
// ── Particles ──
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<40;i++){
    const p=document.createElement('div');p.className='p';
    p.style.left=Math.random()*100+'%';
    p.style.width=p.style.height=(1+Math.random()*3)+'px';
    p.style.animationDuration=(10+Math.random()*25)+'s';
    p.style.animationDelay=(Math.random()*20)+'s';
    p.style.background=`rgba(0,${200+Math.floor(Math.random()*55)},${150+Math.floor(Math.random()*105)},${.15+Math.random()*.3})`;
    c.appendChild(p);
  }
})();

// ── State ──
let windows={};
let winIdCounter=0;
let lastTime=0;
let termLines=[];
let dragging={win:null,ox:0,oy:0,ex:0,ey:0};

// ── Clock ──
function updateClock(){
  const d=new Date();
  document.getElementById('taskbarClock').textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);updateClock();

// ── API ──
async function api(url,data){
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})});return await r.json()}
  catch(e){return{error:e.message}}
}
async function apiGet(url){
  try{const r=await fetch(url);return await r.json()}
  catch(e){return{}}
}

// ── Window System ──
const winDefs={
  terminal:{title:'Terminal — CCL',icon:'⬢',w:600,h:340,defX:80,defY:60},
  files:{title:'File Manager',icon:'📁',w:500,h:360,defX:140,defY:100},
  todo:{title:'Todo List',icon:'✓',w:380,h:340,defX:200,defY:80},
  notes:{title:'Notes',icon:'📝',w:380,h:340,defX:260,defY:120},
  monitor:{title:'System Monitor',icon:'📊',w:420,h:320,defX:100,defY:140},
  projects:{title:'Projects',icon:'◆',w:420,h:320,defX:180,defY:100},
  providers:{title:'AI Providers',icon:'◈',w:400,h:360,defX:120,defY:80},
  wallet:{title:'CCL Wallet',icon:'◎',w:380,h:280,defX:220,defY:160},
  settings:{title:'Settings',icon:'⚙',w:400,h:340,defX:160,defY:120},
};

function openWindow(type){
  if(windows[type]&&windows[type].el){
    focusWindow(type);return
  }
  const def=winDefs[type];
  if(!def)return;
  const id='win_'+(++winIdCounter);
  const el=document.createElement('div');el.className='window';el.id=id;
  const w=Math.min(def.w,window.innerWidth-40),h=Math.min(def.h,window.innerHeight-100);
  const x=Math.min(def.defX,window.innerWidth-w-20),y=Math.min(def.defY,window.innerHeight-h-80);
  el.style.cssText=`width:${w}px;height:${h}px;left:${x}px;top:${y}px`;
  if(type==='terminal')el.classList.add('term-win');
  el.innerHTML=`
    <div class="win-header" onmousedown="startDrag(event,'${id}')">
      <div class="win-dots">
        <div class="win-dot r" onclick="closeWindow('${type}')"></div>
        <div class="win-dot y" onclick="minWindow('${id}')"></div>
        <div class="win-dot g" onclick="maxWindow('${id}')"></div>
      </div>
      <div class="win-title">${def.icon} ${def.title}</div>
    </div>
    <div class="win-body" id="${id}_body">Loading...</div>`;
  document.getElementById('windows').appendChild(el);
  windows[type]={el,id,type};
  focusWindow(type);
  updateTaskbar();
  renderWinContent(type,id);
}

function closeWindow(type){
  if(!windows[type])return;
  const w=windows[type];
  w.el.remove();
  const tb=document.querySelector(`.taskbar-item[data-win="${type}"]`);
  if(tb)tb.remove();
  delete windows[type];
}

function focusWindow(type){
  if(!windows[type])return;
  const w=windows[type];
  w.el.style.zIndex=50+(++winIdCounter);
  w.el.style.borderColor='rgba(0,245,200,.25)';
  Object.keys(windows).forEach(k=>{
    if(k!==type&&windows[k].el)windows[k].el.style.borderColor='rgba(0,245,200,.08)';
  });
  document.querySelectorAll('.taskbar-item').forEach(e=>e.classList.remove('active'));
  const tb=document.querySelector(`.taskbar-item[data-win="${type}"]`);
  if(tb)tb.classList.add('active');
}

function minWindow(id){
  const el=document.getElementById(id);
  if(el)el.style.display='none';
}
function maxWindow(id){
  const el=document.getElementById(id);
  if(!el)return;
  if(el.style.width==='100%'){
    el.style.width='';el.style.height='';el.style.left='';el.style.top='';
  }else{
    el.style.width='100%';el.style.height='100%';el.style.left='0';el.style.top='0';
  }
}

// ── Drag ──
function startDrag(e,id){
  const el=document.getElementById(id);if(!el)return;
  const r=el.getBoundingClientRect();
  dragging={win:id,ox:e.clientX-r.left,oy:e.clientY-r.top,ex:e.clientX,ey:e.clientY};
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',stopDrag);
}
function onDrag(e){
  if(!dragging.win)return;
  const el=document.getElementById(dragging.win);if(!el)return;
  el.style.left=(e.clientX-dragging.ox)+'px';
  el.style.top=(e.clientY-dragging.oy)+'px';
}
function stopDrag(){dragging={win:null};document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',stopDrag);}

// ── Taskbar ──
function updateTaskbar(){
  const tb=document.getElementById('taskbarItems');tb.innerHTML='';
  Object.keys(windows).forEach(k=>{
    const def=winDefs[k];if(!def)return;
    const d=document.createElement('div');d.className='taskbar-item';d.dataset.win=k;
    d.textContent=def.icon+' '+def.title.split('—')[0].trim();
    d.onclick=()=>{
      const w=windows[k];
      if(w.el.style.display==='none'){w.el.style.display='';focusWindow(k)}
      else focusWindow(k);
    };
    tb.appendChild(d);
  });
}

// ── Render Window Content ──
async function renderWinContent(type,id){
  const body=document.getElementById(id+'_body');if(!body)return;
  switch(type){
    case 'terminal':renderTerminal(body,id);break;
    case 'files':renderFiles(body);break;
    case 'todo':renderTodo(body);break;
    case 'notes':renderNotes(body);break;
    case 'monitor':renderMonitor(body);break;
    case 'projects':renderProjects(body);break;
    case 'providers':renderProviders(body);break;
    case 'wallet':renderWallet(body);break;
    case 'settings':renderSettings(body);break;
  }
}

// ── TERMINAL ──
function renderTerminal(body,id){
  body.innerHTML=`
    <div class="term-output" id="${id}_output">
      <div class="l out">⬡ CCL OMNIA Terminal ready.</div>
      <div class="l out">Type a command or click Quick Actions.</div>
    </div>
    <div class="term-input-row">
      <span class="term-prompt">⬡ ›</span>
      <input class="term-input" id="${id}_input" placeholder="type a command..." autofocus
        onkeydown="if(event.key==='Enter'){submitTerm('${id}')}">`;
  setTimeout(()=>{
    const inp=document.getElementById(id+'_input');
    if(inp)inp.focus();
  },100);
}
window.submitTerm=function(id){
  const input=document.getElementById(id+'_input');
  if(!input)return;
  const cmd=input.value.trim();if(!cmd)return;
  addTermLine(id,'› '+cmd,'cmd');
  input.value='';
  api('/api/run',{command:cmd});
};
function addTermLine(id,text,type){
  const out=document.getElementById(id+'_output');
  if(!out)return;
  const d=document.createElement('div');d.className='l '+type;
  d.textContent=text;out.appendChild(d);out.scrollTop=out.scrollHeight;
}

// ── TODO ──
async function renderTodo(body){

};
window.delTodo=async function(i){

};
window.clearTodos=async function(){

// ── MONITOR ──
async function renderMonitor(body){
  const s=await apiGet('/api/sysinfo');
  if(s.error){body.innerHTML=`<div style="color:var(--err)">${s.error}</div>`;return}
  const ok='#39ff87';
  const cpuC=s.cpu<50?ok:s.cpu<80?'#ffd700':'#ff4466';
  const memC=s.ram_pct<50?ok:s.ram_pct<80?'#ffd700':'#ff4466';
  const diskC=s.disk_pct<50?ok:s.disk_pct<80?'#ffd700':'#ff4466';
  body.innerHTML=`
    <div class="sys-grid">
      <div class="sys-metric"><div class="val" style="color:${cpuC}">${s.cpu}%</div><div class="lbl">CPU</div><div class="bar-bg"><div class="bar-fill" style="width:${s.cpu}%;background:${cpuC}"></div></div></div>
      <div class="sys-metric"><div class="val" style="color:${memC}">${s.ram_used}/${s.ram_total}GB</div><div class="lbl">RAM ${s.ram_pct}%</div><div class="bar-bg"><div class="bar-fill" style="width:${s.ram_pct}%;background:${memC}"></div></div></div>
      <div class="sys-metric"><div class="val" style="color:${diskC}">${s.disk_used}/${s.disk_total}GB</div><div class="lbl">DISK ${s.disk_pct}%</div><div class="bar-bg"><div class="bar-fill" style="width:${s.disk_pct}%;background:${diskC}"></div></div></div>
      <div class="sys-metric"><div class="val" style="color:#00f5c8">${s.uptime||'?'}</div><div class="lbl">UPTIME</div></div>
    </div>
    <div style="margin-top:10px;font-size:.65rem;color:var(--dim);display:grid;grid-template-columns:1fr 1fr;gap:4px">
      <div>Host: ${s.hostname}</div>
      <div>Cores: ${s.cpu_cores}</div>
      <div>Python: ${s.python}</div>
      <div>Processes: ${s.processes}</div>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px">
      <button onclick="runCCL('sysinfo')">Detailed Info</button>
      <button onclick="runCCL('neofetch')">Neofetch</button>
      <button onclick="runCCL('ip')">Network</button>
    </div>`;
}

// ── Quick Run ──
window.runCCL=function(cmd){
  api('/api/run',{command:cmd});
  // find terminal window
  for(const k in windows){
    if(windows[k].type==='terminal'){
      addTermLine(windows[k].id,'› '+cmd,'cmd');
    }
  }
};

// ── SSE Terminal Output ──
function connectOutput(){
  const ev=new EventSource('/api/output?since='+lastTime);
  ev.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);lastTime=d.t;
      for(const k in windows){
        if(windows[k].type==='terminal')addTermLine(windows[k].id,d.text,'out');
      }
    }catch(e){}
  };
  ev.onerror=()=>{ev.close();setTimeout(connectOutput,2000)};
}

// ── Start Menu ──
window.toggleStart=function(){
  const m=document.getElementById('startMenu');
  m.style.display=m.style.display==='block'?'none':'block';
};
document.addEventListener('click',e=>{
  const m=document.getElementById('startMenu');
  if(m.style.display==='block'&&!e.target.closest('#startMenu')&&!e.target.closest('#startBtn'))
    m.style.display='none';
});

// ── Init ──
connectOutput();
setTimeout(()=>{
  openWindow('terminal');
  Object.keys(winDefs).forEach(k=>{
    const tb=document.querySelector(`.taskbar-item[data-win="${k}"]`);
    if(tb)tb.classList.remove('active');
  });
  const tb=document.querySelector(`.taskbar-item[data-win="terminal"]`);
  if(tb)tb.classList.add('active');
},800);
</script>
